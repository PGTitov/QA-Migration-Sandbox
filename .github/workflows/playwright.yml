name: Playwright CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run tests against
        required: true
        default: main
        type: string
      testIds:
        description: Optional test grep filter (comma separated or single value)
        required: false
        default: ''
        type: string
      folders:
        description: Optional folders to run (comma separated, e.g. tests/qa)
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        shell: bash
        run: |
          TEST_ARGS=()

          if [ -n "${{ github.event.inputs.folders }}" ]; then
            IFS=',' read -r -a folders <<< "${{ github.event.inputs.folders }}"
            for folder in "${folders[@]}"; do
              trimmed="${folder//[[:space:]]/}"
              if [ -n "$trimmed" ]; then
                TEST_ARGS+=("$trimmed")
              fi
            done
          fi

          if [ -n "${{ github.event.inputs.testIds }}" ]; then
            TEST_ARGS+=("-g" "${{ github.event.inputs.testIds }}")
          fi

          if [ ${#TEST_ARGS[@]} -eq 0 ]; then
            TEST_ARGS+=("tests")
          fi

          echo "Running Playwright with: ${TEST_ARGS[*]}"
          npx playwright test "${TEST_ARGS[@]}"

      - name: Publish Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Show test summary
        if: always()
        run: |
          echo "Playwright run completed."
          echo "Check the uploaded report and test-results artifacts for detailed output."
