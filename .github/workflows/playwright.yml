name: Playwright CI

on:
  workflow_dispatch:
    inputs:
      testIds:
        description: Optional test grep filter (comma separated or single value)
        required: false
        default: ''
        type: string
      folders:
        description: Optional folders to run (comma separated; defaults to tests/qa)
        required: false
        default: 'tests/qa'
        type: string
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: |
          rm -rf ~/.cache/ms-playwright
          npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        id: run-tests
        shell: bash
        run: |
          TEST_ARGS=()

          if [ -n "${{ github.event.inputs.folders }}" ]; then
            IFS=',' read -r -a folders <<< "${{ github.event.inputs.folders }}"
            for folder in "${folders[@]}"; do
              trimmed="${folder//[[:space:]]/}"
              if [ -n "$trimmed" ]; then
                TEST_ARGS+=("$trimmed")
              fi
            done
          else
            TEST_ARGS+=("tests/qa")
          fi

          if [ -n "${{ github.event.inputs.testIds }}" ]; then
            TEST_ARGS+=("-g" "${{ github.event.inputs.testIds }}")
          fi

          echo "Running Playwright with: ${TEST_ARGS[*]}"
          npx playwright test "${TEST_ARGS[@]}"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  report:
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Playwright artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: playwright-results
          path: playwright-artifacts

      - name: Publish consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-final
          path: playwright-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: Show test summary
        if: always()
        run: |
          echo "Playwright run completed."
          echo "Artifacts are available in the workflow run summary."
